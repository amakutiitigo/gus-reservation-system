<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>現在の予約</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 500px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    color: #333;
}

.info {
    text-align: left;
    margin: 20px 0;
    padding: 15px;
    background: #f9f9f9;
    border-radius: 8px;
}

/* ボタン共通 */
.btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    text-align: center;
    font-size: 16px;
    box-sizing: border-box;
}

/* 個別 */
.btn-blue {
    background: #2196F3;
}

.btn-blue:hover {
    background: #1976D2;
}

.btn-red {
    background: #d9534f;
}

.btn-red:hover {
    background: #c9302c;
}

.back {
    margin-top: 20px;
    display: inline-block;
    color: #555;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

    {% if data[7]|int == 1 %}
    <p style="color:green;"><b>予約確定</b></p>
{% else %}
    <p style="color:orange;"><b>予約確認中</b></p>
{% endif %}

{% if data %}

    <h2>現在の予約</h2>

    <div class="info">
        <p><b>日付：</b>{{ data[1] }}</p>
        <p><b>時間：</b>{{ data[2] }}</p>
        <p><b>名前：</b>{{ data[3] }}</p>
        <p><b>電話：</b>{{ data[4] }}</p>
        <p><b>住所：</b>{{ data[5] }}</p>
        <p><b>メール：</b>{{ data[6] or "" }}</p>
    </div>

    <!-- ボタン -->
    <div style="margin-top:20px;">
        <a href="/edit" class="btn btn-blue">変更する</a>
        <a href="/delete" class="btn btn-red">削除する</a>
    </div>

{% else %}

    <h2>予約がありません</h2>
    <p>現在の予約は登録されていません。</p>

{% endif %}

<a class="back" href="/">← 戻る</a>

</div>

</body>
</html>

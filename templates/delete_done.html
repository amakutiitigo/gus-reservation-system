<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>削除完了</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f5;

    /* ★見やすいサイズ */
    font-size: 24px;
    line-height: 1.7;
}

.container {
    max-width: 700px;
    margin: 60px auto;
    padding: 20px;
}

/* カード */
.card {
    background: white;
    padding: 30px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* アイコン */
.icon {
    font-size: 50px;
    margin-bottom: 15px;
}

/* タイトル */
h2 {
    font-size: 36px;
    color: #e74c3c;
    margin-bottom: 15px;
}

/* 説明 */
.text {
    font-size: 22px;
    margin-top: 10px;
}

/* ボタン */
.button {
    display: block;
    width: 100%;
    padding: 22px;
    margin-top: 25px;
    background: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 26px;
    box-sizing: border-box;
}

.button:active {
    transform: scale(0.98);
}
</style>
</head>

<body>

<div class="container">

<div class="card">

    <div class="icon">🗑️</div>

    <h2>予約を削除しました</h2>

    <div class="text">
        予約は正常に削除されました。<br>
        新規予約から再度お申し込みいただけます。
    </div>

    <a href="/" class="button">トップへ戻る</a>

</div>

</div>

</body>
</html>

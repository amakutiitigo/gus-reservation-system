<form method="POST" action="/admin_edit_save">

<input type="hidden" name="id" value="{{ data[0] }}">

<div>日付</div>
<input type="date" name="date" value="{{ data[1] }}">

<div>時間</div>
<input type="time" name="time" value="{{ data[2] }}">

<div>名前</div>
<input type="text" name="name" value="{{ data[3] }}">

<div>電話</div>
<input type="text" name="phone" value="{{ data[4] }}">

<div>住所</div>
<input type="text" name="address" value="{{ data[5] }}">

<div>メールアドレス</div>
<input type="email" name="email" value="{{ data[6] }}">

<button type="submit">強制更新</button>

</form>

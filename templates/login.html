<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ログイン</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

    font-size: 20px;
}

/* カード */
.card {
    width: 90%;
    max-width: 420px;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

/* タイトル */
h1 {
    font-size: 24px;
    margin-bottom: 20px;
    color: #333;
    line-height: 1.4;
}

/* 入力 */
input[type="password"] {
    width: 100%;
    padding: 16px;
    font-size: 20px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

/* ボタン */
button {
    width: 100%;
    padding: 16px;
    margin-top: 15px;
    font-size: 20px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:active {
    transform: scale(0.98);
}

/* エラー */
.error {
    color: #e53935;
    margin-top: 12px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="card">

    <h1>紀北保安センター<br>ガス点検ウェブ予約システム<br>管理者ログイン</h1>

    <form method="POST">
        <input type="password" name="password" placeholder="パスワード">
        <button type="submit">ログイン</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ウェブ予約管理メニュー</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    padding-top: 50px;
}

button {
    width: 250px;
    padding: 15px;
    margin: 15px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #2196F3;
    color: white;
}

.notice {
    margin-bottom: 20px;
    font-size: 18px;
    color: rgb(255, 98, 0);
}

.btn-orange {
    background: orange;
    color: white;
}

.btn-logout {
    background: rgb(255, 68, 0);
    color: white;
}
</style>
</head>

<body>

<h2>紀北保安センター ウェブ予約管理メニュー</h2>

<!-- ★ここが追加ポイント -->
<div class="notice">
{% if start_data %}
    予約可能期間：{{ start_data }} ～ {{ end_data }}
{% else %}
    ⚠ 予約可能期間が未設定です
{% endif %}
</div>

<form action="/admin_setting">
    <button type="submit" class="btn-orange">予約可能期間設定</button>
</form>

<hr>

<form action="/admin">
    <button type="submit">予約一覧</button>
</form>

<form action="/admin_deleted">
    <button type="submit">削除済み一覧</button>
</form>

<form action="/admin_block">
    <button type="submit">予約除外日設定</button>
</form>

<hr>

<form action="/logout">
    <button type="submit" class="btn-logout">ログアウト</button>
</form>

</body>
</html>

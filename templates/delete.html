<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>削除確認</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f4f6f9;

    /* ★しっかり見えるサイズ */
    font-size: 24px;
    line-height: 1.7;
}

.container {
    max-width: 700px;
    margin: 60px auto;
    padding: 20px;
}

/* カード */
.card {
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    text-align: center;
}

/* タイトル（危険感） */
h2 {
    font-size: 36px;
    color: #d9534f;
    margin-bottom: 20px;
}

/* 情報 */
.info {
    text-align: left;
    margin: 20px 0;
    padding: 20px;
    background: #f9f9f9;
    border-radius: 10px;
    overflow-wrap: break-word;
}

/* 強調 */
.big {
    font-size: 28px;
    font-weight: bold;
}

/* ボタン */
button {
    width: 100%;
    padding: 22px;
    font-size: 26px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    color: white;
    margin-top: 15px;
}

/* 削除（強め） */
.btn-delete {
    background: #d9534f;
}

/* 戻る */
.btn-back {
    background: #999;
}

button:active {
    transform: scale(0.98);
}
</style>
</head>

<body>

<div class="container">

<div class="card">

{% if data %}

    <h2>この予約を<br>
        削除しますか？</h2>

    <div class="info">
        <p><b>日付：</b><span class="big">{{ data[1] }}</span></p>
        <p><b>時間：</b><span class="big" id="time_view"></span></p>
        <p><b>名前：</b>{{ data[3] }}</p>
        <p><b>電話：</b>{{ data[4] }}</p>
        <p><b>住所：</b>{{ data[5] }}</p>
        <p><b>メール：</b>{{ data[6] }}</p>
    </div>

    <!-- 削除フォーム -->
    <form method="POST" action="/delete_confirm">

        <input type="hidden" name="date" value="{{ data[1] }}">
        <input type="hidden" name="time" value="{{ data[2] }}">
        <input type="hidden" name="name" value="{{ data[3] }}">
        <input type="hidden" name="phone" value="{{ data[4] }}">
        <input type="hidden" name="address" value="{{ data[5] }}">
        <input type="hidden" name="email" value="{{ data[6] or "" }}">

        <button type="submit" class="btn-delete"
            onclick="return confirmDelete()">
            削除する
        </button>
    </form>

    <!-- 戻る -->
    <form action="/">
        <button type="submit" class="btn-back">
            戻る
        </button>
    </form>

{% else %}

    <h2>削除対象なし</h2>
    <p>現在、削除できる予約はありません。</p>

    <form action="/">
        <button type="submit" class="btn-back">
            戻る
        </button>
    </form>

{% endif %}

</div>

</div>

<script>
function formatRange(t){
    if(!t) return "";

    let parts = t.split(":");

    let h = parseInt(parts[0]);
    let m = parseInt(parts[1]);

    if(isNaN(h) || isNaN(m)) return t;

    let end = new Date();
    end.setHours(h);
    end.setMinutes(m + 30);

    let eh = String(end.getHours()).padStart(2,'0');
    let em = String(end.getMinutes()).padStart(2,'0');

    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}～${eh}:${em}`;
}

document.getElementById("time_view").innerText =
    formatRange("{{ data[2] }}");
</script>

<script>
window.addEventListener("load", function(){

    document.querySelector('form[method="POST"]').addEventListener("submit", function(){
        document.getElementById("loadingOverlay").style.display = "flex";
    });

});
</script>

<script>
function confirmDelete(){

    if(confirm("本当に削除しますか？")){
        document.getElementById("loadingOverlay").style.display = "flex";
        return true; // submit実行
    }

    return false; // キャンセル
}
</script>

<div id="loadingOverlay" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    z-index:9999;
    justify-content:center;
    align-items:center;
">
    <div style="
        background:white;
        padding:30px 40px;
        border-radius:10px;
        text-align:center;
        font-size:20px;
    ">
        <div style="font-size:40px;">⏳</div>
        しばらくお待ちください...
    </div>
</div>

</body>
</html>

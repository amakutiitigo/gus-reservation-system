<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>予約確認画面</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f5;

    /* ★もう限界クラス */
    font-size: 52px;
    line-height: 2.4;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px;
}

h2 {
    font-size: 72px;
    text-align: center;
    margin-bottom: 40px;
}

/* カード */
.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
}

/* 各行 */
.card p {
    margin: 28px 0;
}

/* 超重要：値はさらにデカく */
.big {
    font-size: 60px;
    font-weight: bold;
}

/* ボタン */
button {
    width: 100%;
    padding: 40px;
    font-size: 48px;
    margin-top: 40px;
    border-radius: 18px;
    border: none;
    background: #4CAF50;
    color: white;
}

/* 戻る */
.back {
    background: #777;
}
</style>
</head>

<body>

    <form method="POST" action="/create_confirm">
    
        <div class="container">
        
            <h2>この内容で予約しますか？</h2>
                
            <div class="card">
                <p>日付：<span class="big">{{ data.date }}</span></p>
                <p>時間：<span class="big" id="time_view"></span></p>
                <p>氏名：{{ data.name }}</p>
                <p>電話：{{ data.phone }}</p>
                <p>住所：{{ data.address }}</p>
                <p>メール：{{ data.email }}</p>
            </div>
            
            <!-- hidden -->
            <input type="hidden" name="date" value="{{ data.date }}">
            <input type="hidden" name="time" value="{{ data.time }}">
            <input type="hidden" name="name" value="{{ data.name }}">
            <input type="hidden" name="phone" value="{{ data.phone }}">
            <input type="hidden" name="address" value="{{ data.address }}">
            <input type="hidden" name="email" value="{{ data.email }}">
            
            <button type="submit">この内容で予約する</button>
        
        </div>
    
    </form>
    
        <form method="POST" action="/new">
        <input type="hidden" name="date" value="{{ data.date }}">
        <input type="hidden" name="time" value="{{ data.time }}">
        <input type="hidden" name="name" value="{{ data.name }}">
        <input type="hidden" name="phone" value="{{ data.phone }}">
        <input type="hidden" name="address" value="{{ data.address }}">
        <input type="hidden" name="email" value="{{ data.email }}">

        <button class="back">戻る</button>
    </form>
    
    </body>

<script>
function formatRange(t){
    if(!t || !t.includes(":")) return "";

    let [h,m] = t.split(":").map(Number);

    let end = new Date();
    end.setHours(h);
    end.setMinutes(m + 30);

    let eh = String(end.getHours()).padStart(2,'0');
    let em = String(end.getMinutes()).padStart(2,'0');

    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}～${eh}:${em}`;
}

document.getElementById("time_view").innerText =
    formatRange("{{ data.time }}");
</script>

<script>
window.addEventListener("load", function(){

    document.querySelectorAll("form").forEach(f => {
        f.addEventListener("submit", function(){
            document.getElementById("loadingOverlay").style.display = "flex";
        });
    });

});
</script>

<div id="loadingOverlay" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    z-index:9999;
    justify-content:center;
    align-items:center;
">
    <div style="
        background:white;
        padding:30px 40px;
        border-radius:10px;
        text-align:center;
        font-size:20px;
    ">
        <div style="font-size:40px;">⏳</div>
        しばらくお待ちください...
    </div>
</div>

</body>
</html>

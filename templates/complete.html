<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約完了</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    text-align: center;

    /* ★全体ちょい大きめ */
    font-size: 22px;
    line-height: 1.8;
}

.container {
    max-width: 600px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* 完了メッセージ */
.success {
    font-size: 32px;
    color: #28a745;
    margin-bottom: 20px;
    font-weight: bold;
}

/* サブ */
p {
    font-size: 22px;
}

/* 情報 */
.info {
    text-align: left;
    margin-top: 20px;
    padding: 20px;
    background: #f9f9f9;
    border-radius: 10px;
    font-size: 22px;
}

.info p {
    margin: 12px 0;
}

/* 時間だけ少し強調 */
#time_view {
    font-size: 26px;
    font-weight: bold;
}

/* ボタン */
.btn {
    display: inline-block;
    padding: 18px;
    width: 100%;
    background: #2196F3;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    margin-top: 25px;
    font-size: 24px;
    box-sizing: border-box;
}
</style>
</head>

<body>

<div class="container">

<div class="success">✅ 予約が完了しました</div>

<p>ご予約ありがとうございます。</p>

<div class="info">
    <p><b>日付：</b>{{ data.date }}</p>
    <p><b>時間：</b><span id="time_view"></span></p>
    <p><b>名前：</b>{{ data.name }}</p>
</div>

<a href="/" class="btn">トップへ戻る</a>

</div>

<script>
function formatRange(t){
    if(!t || !t.includes(":")) return "";

    let [h,m] = t.split(":").map(Number);

    let end = new Date();
    end.setHours(h);
    end.setMinutes(m + 30);

    let eh = String(end.getHours()).padStart(2,'0');
    let em = String(end.getMinutes()).padStart(2,'0');

    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}～${eh}:${em}`;
}

document.getElementById("time_view").innerText =
    formatRange("{{ data.time }}");
</script>

</body>
</html>

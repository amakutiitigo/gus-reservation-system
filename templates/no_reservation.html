<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>予約データなし</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

.container{
    max-width:500px;
    margin:100px auto;
    background:white;
    padding:40px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

h2{
    margin:0 0 15px;
    color:#2c3e50;
}

p{
    color:#666;
    line-height:1.8;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:12px 24px;
    border-radius:10px;
    background:#3498db;
    color:white;
    text-decoration:none;
    font-size:16px;
    transition:0.2s;
}

.btn:hover{
    background:#2980b9;
}

</style>
</head>

<body>

<div class="container">

    <div class="icon">📭</div>

    <h2>予約データがありません</h2>

    <p>
        現在、変更可能な予約データが見つかりませんでした。<br>
        予約コードをご確認ください。
    </p>

    <a href="/" class="btn">
        トップへ戻る
    </a>

</div>

</body>
</html>

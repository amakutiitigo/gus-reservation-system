<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガス点検予約受付</title>

<style>
body {
    background: #f5f5f5;
    font-family: Arial;

    font-size: 24px;   /* 36 → 24 */
    line-height: 1.6;
}

.container {
    max-width: 700px;
    margin: auto;
    text-align: center;
    padding: 20px;
}

h2 {
    font-size: 32px;   /* 48 → 32 */
    margin-bottom: 16px;
}

.card {
    background: white;
    padding: 18px;
    border-radius: 12px;
}

/* 説明 */
.info-box {
    background:#eef6ff;
    border-left:5px solid #2196F3;
    padding:12px;
    border-radius:8px;
    margin-bottom:16px;
    font-size:18px;   /* 24 → 16 */
    text-align:left;
    line-height: 1.5;
}

/* ラベル */
.label {
    text-align: left;
    font-size: 18px;  /* 28 → 18 */
    margin-top: 8px;
}

/* 入力 */
input {
    width: 100%;
    padding: 16px;   /* 22 → 16 */
    margin-top: 8px;
    font-size: 22px; /* 32 → 22 */
    box-sizing: border-box;
    border-radius: 8px;
}

/* ボタン */
button {
    width: 100%;
    padding: 18px;   /* 24 → 18 */
    margin-top: 10px;
    font-size: 22px; /* 32 → 22 */
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

/* 色 */
.btn-green { background: #4CAF50; }
.btn-blue  { background: #2196F3; }
.btn-red   { background: #d9534f; }
.btn-check { background: #ff9800; }

/* 区切り */
.check-area {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 2px solid #ddd;
}

button:active {
    transform: scale(0.98);
}
</style>

</head>

<body>

<div class="container">

<h2>紀北保安センター<br>
    ガス点検予約</h2>

<div class="card">

<form method="POST" onsubmit="return validateForm()">

<div class="info-box">
<b>ご予約について</b><br>
・予約にはお客様コードが必要です<br>
・予約は24時間後以降のみ可能です<br>
・土日祝日は予約できません<br>
・直前の変更はお電話でご相談ください
</div>

<div class="label">お客様コード（11桁・ハイフン不要）</div>

<input 
    type="tel"
    inputmode="numeric"
    name="consumer_code" 
    id="consumer_code"
    placeholder="00000000000"
    maxlength="11"
    required
>

<input type="hidden" name="action" id="action">

<button type="submit" class="btn-green" onclick="setAction('新規')">
    新規予約
</button>

<button type="submit" class="btn-blue" onclick="setAction('変更')">
    予約変更
</button>

<button type="submit" class="btn-red" onclick="setAction('削除')">
    予約削除
</button>

<div class="check-area">

<button type="submit" class="btn-check" onclick="setAction('確認')">
    予約状況を確認
</button>

</div>

</form>

</div>

</div>

<script>

const input = document.getElementById("consumer_code");

/* 数字のみ */
input.addEventListener("input", function(e) {
    e.target.value = e.target.value.replace(/[^0-9]/g, "");
});

/* ハイフン整形 */
input.addEventListener("blur", function(e) {
    let v = e.target.value;

    if (v.length === 11) {
        v = v.slice(0,3) + "-" + v.slice(3,7) + "-" + v.slice(7);
    }

    e.target.value = v;
});

/* action */
function setAction(val){
    document.getElementById("action").value = val;
}

/* バリデーション */
function validateForm(){

    let v = document.getElementById("consumer_code").value;
    v = v.replace(/-/g, "");

    if(!/^\d{11}$/.test(v)){
        alert("消費者コードは11桁で入力してください");
        return false;
    }

    return true;
}

</script>

</body>
</html>

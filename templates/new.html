<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規予約</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
    
        /* ★全体1.5倍 */
        font-size: 24px;
        line-height: 1.6;
    }
    
    .container {
        max-width: 700px; /* 少し広げる */
        margin: auto;
        padding: 15px;
    }
    
    h2 {
        font-size: 36px;
        margin-bottom: 15px;
    }
    
    #calendar {
        width: 100%;
        aspect-ratio: 1 / 1;  /* ★これが本体（正方形） */
        background: white;
    border-radius: 12px;
    padding: 10px;
    }
    
    /* 注意文 */
    .notice {
        padding: 15px;
        background: #fff3cd;
        border-radius: 10px;
        margin-bottom: 8px;
        font-size: 20px;
    }
    
    /* ラベル */
    label, div {
        font-size: 22px;
        margin-top: 10px;
    }
    
    /* 入力 */
    input, select {
        width: 100%;
        padding: 18px;
        margin-top: 8px;
        font-size: 24px;
        box-sizing: border-box;
        border-radius: 10px;
    }
    
    /* ボタン */
    button {
        width: 100%;
        padding: 20px;
        margin-top: 15px;
        font-size: 26px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 10px;
    }
    
    button:active {
        transform: scale(0.98);
    }

    .fc-toolbar-title {
    font-size: 26px !important;
    }

    /* マスを正方形寄りにする */
    .fc .fc-daygrid-day-frame {
        min-height: 80px;
        height: auto !important;
    }

    /* 日付の行間を詰める */
    .fc .fc-daygrid-day-top {
        padding: 2px 4px;   /* 上下を小さく */
        line-height: 1.1;   /* 行間を詰める */
    }

    /* 日付の数字そのもの */
    .fc .fc-daygrid-day-number {
        padding: 0;
        font-size: 20px;    /* 必要なら微調整 */
    }

    .bg-holiday { background: #eee !important; }
    .bg-current { background: #90caf9 !important; }
    .bg-selected { background: #ffe082 !important; }

    </style>
</head>

<body>

<div class="container">

<h2>新規予約</h2>

<div style="padding:10px; background:#fff3cd; border-radius:8px; margin-bottom:5px;">
    ※予約は24時間後以降のみ可能です。
</div>

<div style="padding:10px; background:#fff3cd; border-radius:8px;">
    ※土日祝日は予約不可。その他、予約できない日時は選択できません。
</div>

<div>お客様コード</div>
<input type="text" value="{{ session.get('code') }}" readonly>

<div style="
    background:#fff3cd;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
">
    予約可能期間：<br>{{ start_date }} ～ {{ end_date }}
</div>

<div id="calendar"></div>

<div>予約時間</div>
<select id="time_select"></select>

<form method="POST" action="/confirm">
<input type="hidden" name="date" id="date" required>
<input type="hidden" name="time" id="time" required>

<div>氏名</div>
<input type="text" name="name" value="{{ data.name }}" required>

<div>電話番号</div>
<input type="text" name="phone" value="{{ data.phone }}" required>

<div>住所</div>
<input type="text" name="address" value="{{ data.address }}" required>

<div>メールアドレス（任意）</div>
<input type="email" name="email" value="{{ data.email }}"
       placeholder="入力すると、予約確定後にメールが届きます"
       style="font-size:18px;">

<div style="font-size:18px; color:#666; margin-top:5px;">
    ※メールで返信をご希望の場合は入力してください
</div>


<button type="submit">確認画面へ</button>
</form>

</div>

<div id="loadingOverlay" style="
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
">
    <div style="
        background:white;
        padding:40px;
        border-radius:12px;
        text-align:center;
        font-size:24px;
    ">
        <div style="font-size:40px;">⏳</div>
        しばらくお待ちください...
    </div>
</div>

<script>

let startDate = "{{ start_date or '' }}";
let endDate = "{{ end_date or '' }}";

let initDate = "{{ data.date or '' }}";
let initTime = "{{ data.time or '' }}";
let selectedDate = "";

let holidays = [];

/* =========================
   日付処理
========================= */
function formatDate(d){
    let y = d.getFullYear();
    let m = String(d.getMonth()+1).padStart(2,'0');
    let da = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${da}`;
}

function addOneDay(dateStr){
    if(!dateStr) return undefined;
    let d = new Date(dateStr);
    d.setDate(d.getDate() + 1);
    return formatDate(d);
}

/* =========================
   祝日
========================= */
async function loadHolidays(){
    const res = await fetch("https://holidays-jp.github.io/api/v1/date.json");
    holidays = Object.keys(await res.json());
}

function isHoliday(dateStr){

    if(!dateStr || typeof dateStr !== "string") return false;

    if(holidays.includes(dateStr)) return true;

    let [y,m,d] = dateStr.split("-").map(Number);
    let date = new Date(y, m-1, d);

    let day = date.getDay();

    return day === 0 || day === 6;
}

/* =========================
   24時間制限
========================= */
function isBeforeLimit(dateStr, timeStr){
    let [h,m] = timeStr.split(":").map(Number);

    let [y,mo,d] = dateStr.split("-");
    let target = new Date(y, mo-1, d, h, m);

    let now = new Date();
    let limit = new Date(now.getTime() + 24 * 60 * 60 * 1000);

    return target < limit;
}

/* =========================
   時間表示
========================= */
function formatRange(t){
    if(!t || !t.includes(":")) return "";
    let [h,m] = t.split(":").map(Number);

    let end = new Date();
    end.setHours(h);
    end.setMinutes(m + 30);

    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}～${String(end.getHours()).padStart(2,'0')}:${String(end.getMinutes()).padStart(2,'0')}`;
}

/* =========================
   時間取得
========================= */
function loadTimes(date){

    fetch('/get_times?date=' + date)
    .then(res => res.json())
    .then(data => {

        let select = document.getElementById("time_select");
        select.innerHTML = "";

        data.forEach(t => {

            if(isBeforeLimit(date, t)) return;

            let opt = document.createElement("option");
            opt.value = t;
            opt.text = formatRange(t);

            if(t === initTime){
                opt.selected = true;
            }

            select.appendChild(opt);
        });

        document.getElementById("time").value = select.value;

        select.onchange = () => {
            document.getElementById("time").value = select.value;
        };
    });
}

/* =========================
   カレンダー
========================= */
document.addEventListener("DOMContentLoaded", async function(){

    await loadHolidays();

    let calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {

        initialView: "dayGridMonth",
        locale: "ja",
        height: "auto",
        firstDay: 1,

        validRange: (startDate && endDate) ? {
            start: startDate,
            end: addOneDay(endDate)
        } : undefined,

        showNonCurrentDates: false,
        fixedWeekCount: false,

        /* ★ここが最大の違い（eventsやめた） */
        dayCellClassNames: function(arg){

            let d = arg.date;
            let str = formatDate(d);

            let classes = [];

            if(isHoliday(str)){
                classes.push("bg-holiday");
            }

            if(str === initDate){
                classes.push("bg-current");
            }

            if(str === selectedDate){
                classes.push("bg-selected");
            }

            return classes;
        },

        dateClick: function(info){

            let selected = info.dateStr;

            if(isHoliday(selected)){
                alert("土日祝は予約できません");
                return;
            }

            fetch('/check_day?date=' + selected)
            .then(res => res.json())
            .then(res => {

                if(!res.ok){
                    alert(res.message || "この日は予約できません");
                    return;
                }

                selectedDate = selected;
                document.getElementById("date").value = selected;

                loadTimes(selected);

                calendar.render(); // ★これで再描画
            });
        }

    });

    calendar.render();

    if(initDate){
        selectedDate = initDate;
        document.getElementById("date").value = initDate;
        loadTimes(initDate);
        calendar.render();
    }

});

document.querySelector("form").addEventListener("submit", function(){
    document.getElementById("loadingOverlay").style.display = "flex";
});

</script>

</body>
</html>
